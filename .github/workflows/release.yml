name: Release

permissions:
  contents: write
  id-token: write
  packages: write

on:
  push:
    tags:
      - 'v*'

jobs:
  native:
    uses: ./.github/workflows/release-native.yml

  publish:
    runs-on: ubuntu-latest
    needs: [native]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Set node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Force Set pnpm Registry
        run: pnpm config set registry https://registry.npmjs.org

      - run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

      - name: Install Dependencies
        run: pnpm i

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten native artifacts for napi
        run: |
          mkdir -p crates/node/artifacts
          find artifacts/bindings-* -type f \( -name '*.node' -o -name '*.wasm' -o -name '*.js' -o -name '*.cjs' -o -name '*.mjs' \) -exec cp -v {} crates/node/artifacts/ \;
          # napi artifacts expects wasm glue files in the working directory, not just in artifacts/
          cp crates/node/artifacts/rust.wasi.cjs crates/node/ 2>/dev/null || true
          cp crates/node/artifacts/rust.wasi-browser.js crates/node/ 2>/dev/null || true
          cp crates/node/artifacts/wasi-worker.mjs crates/node/ 2>/dev/null || true
          cp crates/node/artifacts/wasi-worker-browser.mjs crates/node/ 2>/dev/null || true

      - name: Move WASM edge artifacts
        run: |
          mkdir -p packages/mdream/wasm
          cp -v artifacts/wasm-edge/* packages/mdream/wasm/

      - name: Generate NAPI index.js and move to npm dirs
        working-directory: crates/node
        run: pnpm exec napi artifacts

      - name: Copy NAPI entry files to distribution package
        run: |
          mkdir -p packages/mdream/napi
          cp crates/node/index.js packages/mdream/napi/index.mjs
          cp crates/node/index.d.ts packages/mdream/napi/index.d.ts
          cp crates/node/index.d.ts packages/mdream/napi/index.d.mts

      - name: Determine npm dist-tag
        id: dist-tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          if [[ "$VERSION" == *"-"* ]]; then
            echo "tag=--tag beta" >> $GITHUB_OUTPUT
          else
            echo "tag=" >> $GITHUB_OUTPUT
          fi

      - name: Publish platform packages
        run: |
          for pkg in crates/node/npm/*/; do
            if [ -f "$pkg/package.json" ]; then
              pnpm publish --access public --no-git-checks --provenance ${{ steps.dist-tag.outputs.tag }} --filter "$(node -p "require('./$pkg/package.json').name")" || true
            fi
          done

      - name: Publish all other packages
        run: pnpm publish -r --access public --no-git-checks --provenance --filter '!@mdream/rust-*' ${{ steps.dist-tag.outputs.tag }}

  docker:
    needs: [native]
    uses: ./.github/workflows/release-docker.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
