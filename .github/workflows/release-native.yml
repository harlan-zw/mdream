name: Build Native

on:
  workflow_call:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            use_napi_cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            use_zigbuild: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            use_zigbuild: true
          - target: armv7-unknown-linux-gnueabihf
            os: ubuntu-24.04
            use_napi_cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-unknown-freebsd
            os: ubuntu-24.04
            use_zigbuild: true
          - target: aarch64-linux-android
            os: ubuntu-24.04
          - target: armv7-linux-androideabi
            os: ubuntu-24.04
          - target: wasm32-wasip1-threads
            os: ubuntu-24.04

    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Setup Android NDK linkers
        if: contains(matrix.target, 'android')
        run: |
          echo "ANDROID_NDK=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          if [[ "${{ matrix.target }}" == "aarch64-linux-android" ]]; then
            echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android24-clang" >> $GITHUB_ENV
          elif [[ "${{ matrix.target }}" == "armv7-linux-androideabi" ]]; then
            echo "CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi24-clang" >> $GITHUB_ENV
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Build native module (zigbuild)
        if: matrix.use_zigbuild
        working-directory: crates/node
        run: pnpm exec napi build --platform --release --esm --target ${{ matrix.target }} -x

      - name: Build native module (napi-cross)
        if: matrix.use_napi_cross
        working-directory: crates/node
        run: pnpm exec napi build --platform --release --esm --target ${{ matrix.target }} --use-napi-cross

      - name: Build native module (wasm)
        if: startsWith(matrix.target, 'wasm')
        working-directory: crates/node
        run: pnpm exec napi build --target ${{ matrix.target }} --profile wasm

      - name: Build native module
        if: ${{ !matrix.use_zigbuild && !matrix.use_napi_cross && !startsWith(matrix.target, 'wasm') }}
        working-directory: crates/node
        run: pnpm exec napi build --platform --release --esm --target ${{ matrix.target }}

      - name: Move artifacts
        working-directory: crates/node
        run: node ./scripts/move-artifacts.mjs
        if: ${{ !startsWith(matrix.target, 'wasm') }}

      - name: Install wasm-opt
        if: startsWith(matrix.target, 'wasm')
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-opt

      - name: Optimize WASM with wasm-opt
        if: startsWith(matrix.target, 'wasm')
        working-directory: crates/node
        run: |
          wasm-opt -Oz --all-features --converge --low-memory-unused rust.wasm -o rust.wasm
          node ./scripts/move-artifacts.mjs

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: bindings-${{ matrix.target }}
          path: |
            crates/node/npm/**/*.node
            crates/node/npm/**/*.wasm
            crates/node/npm/**/*.js
            crates/node/npm/**/*.cjs
            crates/node/npm/**/*.mjs
          if-no-files-found: error

  build-wasm-edge:
    name: Build WASM Edge
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build WASM edge module
        working-directory: crates/edge
        run: wasm-pack build --target web --out-dir ../../packages/mdream/wasm --out-name mdream_edge

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: wasm-edge
          path: packages/mdream/wasm/
          if-no-files-found: error
