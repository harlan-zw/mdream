name: Bundle Size Analysis

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-bundle-size:
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - name: Use Node.js 24.x
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 24.x
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: crates -> target

      - name: Install wasm-pack and wasm-opt
        uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: wasm-pack,wasm-opt

      - name: Build base branch bundles
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          pr_sha=$(git rev-parse HEAD)
          trap 'git checkout --detach "$pr_sha"' EXIT

          git checkout --detach "$BASE_SHA"
          rm -rf /tmp/base-dist
          mkdir -p /tmp/base-dist

          if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts?.['test:bundle-size'] ? 0 : 1)"; then
            pnpm install --frozen-lockfile
            pnpm test:bundle-size
            if node -e "const pkg = require('./package.json'); process.exit(pkg.scripts?.['test:bundle-size:rust'] ? 0 : 1)"; then
              pnpm test:bundle-size:rust
            else
              echo "The base commit predates the Rust bundle-size harness; the WASM bundle will be reported as new."
            fi
            cp -R bench/bundle/dist/. /tmp/base-dist/
          else
            echo "The base commit predates the bundle-size harness; bundles will be reported as new."
          fi

          git checkout --detach "$pr_sha"
          trap - EXIT

      - name: Build pull request bundles
        run: |
          pnpm install --frozen-lockfile
          pnpm test:bundle-size
          pnpm test:bundle-size:rust

      - name: Run performance benchmarks
        run: |
          # base and PR run back-to-back on the same runner so machine variance
          # cancels; both runs use the PR's harness and fixture against the
          # respective built bundles. Pinned semi-space keeps allocation
          # measurement deterministic (see bench/perf-ci.mjs). The extra
          # --no-opt --alloc-only run carries the gated memory signal: with the
          # JIT off, escape-analysis inlining luck can't move the number.
          NODE_FLAGS="--expose-gc --min-semi-space-size=256 --max-semi-space-size=256"
          if [ -f /tmp/base-dist/core/fixtures/core.mjs ]; then
            MDREAM_PERF_DIST=/tmp/base-dist node $NODE_FLAGS bench/perf-ci.mjs > /tmp/base-perf.json \
              || { echo "::warning::base perf run failed; perf deltas will be reported as new"; echo '{}' > /tmp/base-perf.json; }
            MDREAM_PERF_DIST=/tmp/base-dist node --no-opt $NODE_FLAGS bench/perf-ci.mjs --alloc-only > /tmp/base-alloc.json \
              || { echo "::warning::base alloc run failed; alloc deltas will be reported as new"; echo '{}' > /tmp/base-alloc.json; }
          else
            echo "The base commit predates the perf harness; benchmarks will be reported as new."
            echo '{}' > /tmp/base-perf.json
            echo '{}' > /tmp/base-alloc.json
          fi
          node $NODE_FLAGS bench/perf-ci.mjs > /tmp/pr-perf.json \
            || { echo "::warning::PR perf run failed; the perf section will be omitted"; echo '{}' > /tmp/pr-perf.json; }
          node --no-opt $NODE_FLAGS bench/perf-ci.mjs --alloc-only > /tmp/pr-alloc.json \
            || { echo "::warning::PR alloc run failed; gated alloc rows will be missing"; echo '{}' > /tmp/pr-alloc.json; }

      - name: Resolve baseline label
        env:
          BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          short_sha=$(git rev-parse --short "$BASE_SHA")
          date=$(git show -s --format=%cs "$BASE_SHA")
          echo "BASE_LABEL=$BASE_REF @ $short_sha · $date" >> "$GITHUB_ENV"

      - name: Generate bundle report
        env:
          BASE_DIST: /tmp/base-dist
          BASE_PERF: /tmp/base-perf.json,/tmp/base-alloc.json
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_PERF: /tmp/pr-perf.json,/tmp/pr-alloc.json
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPORT_DIR: ${{ runner.temp }}/bundle-size-report
        run: |
          mkdir -p "$REPORT_DIR"
          node bench/bundle/analyze.ts | tee "$REPORT_DIR/report.md"
          cat "$REPORT_DIR/report.md" >> "$GITHUB_STEP_SUMMARY"
          printf '%s\n' "$PR_NUMBER" > "$REPORT_DIR/pr-number.txt"
          printf '%s\n' "$HEAD_SHA" > "$REPORT_DIR/head-sha.txt"

      - name: Upload bundle report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: bundle-size-report
          path: ${{ runner.temp }}/bundle-size-report
          if-no-files-found: error
          retention-days: 1
