name: Release Binaries

on:
  workflow_call:

env:
  CARGO_INCREMENTAL: 0

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            use_zigbuild: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04
            use_zigbuild: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    name: Binary ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install zig
        if: matrix.use_zigbuild
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install cargo-zigbuild
        if: matrix.use_zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates -> target

      - name: Build binary (zigbuild)
        if: matrix.use_zigbuild
        working-directory: crates/core
        run: cargo zigbuild --release --target ${{ matrix.target }}

      - name: Build binary
        if: ${{ !matrix.use_zigbuild }}
        working-directory: crates/core
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          BIN=crates/target/${{ matrix.target }}/release/mdream
          chmod +x "$BIN"
          tar czf mdream-${{ matrix.target }}.tar.gz -C "$(dirname "$BIN")" mdream

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "crates/target/${{ matrix.target }}/release/mdream.exe" -DestinationPath "mdream-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: binary-${{ matrix.target }}
          path: mdream-${{ matrix.target }}.*
          if-no-files-found: error

  upload:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: binary-*

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gh release upload "$TAG" artifacts/binary-*/* --clobber
