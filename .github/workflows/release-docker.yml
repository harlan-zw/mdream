name: Release Docker Images

on:
  workflow_call:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to build and publish
        required: true
        default: latest

env:
  REGISTRY_DOCKERHUB: docker.io
  REGISTRY_GHCR: ghcr.io
  IMAGE_NAME: mdream

jobs:
  # ── crawl image: @mdream/crawl with Playwright Chrome ──
  publish-crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup napi native bindings for Docker build context
        run: |
          mkdir -p crates/node/artifacts packages/mdream/napi

          # Flatten all .node/.wasm files into crates/node/artifacts for napi artifacts
          find artifacts/bindings-* -type f \( -name '*.node' -o -name '*.wasm' -o -name '*.js' -o -name '*.cjs' -o -name '*.mjs' \) -exec cp -v {} crates/node/artifacts/ \;
          # napi artifacts expects wasm glue files in the working directory
          cp crates/node/artifacts/rust.wasi.cjs crates/node/ 2>/dev/null || true
          cp crates/node/artifacts/rust.wasi-browser.js crates/node/ 2>/dev/null || true
          cp crates/node/artifacts/wasi-worker.mjs crates/node/ 2>/dev/null || true
          cp crates/node/artifacts/wasi-worker-browser.mjs crates/node/ 2>/dev/null || true

          # Generate napi index.js/index.d.ts and move bindings to npm subdirs
          cd crates/node && pnpm exec napi artifacts && cd ../..

          # Copy NAPI entry files to distribution package
          cp crates/node/index.js packages/mdream/napi/index.mjs
          cp crates/node/index.d.ts packages/mdream/napi/index.d.ts
          cp crates/node/index.d.ts packages/mdream/napi/index.d.mts

          # Copy linux-x64-gnu binding for Docker build
          find artifacts/bindings-x86_64-unknown-linux-gnu -name "*.node" -exec cp -v {} packages/mdream/napi/ \;

          echo "=== napi directory contents ==="
          ls -la packages/mdream/napi/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GH_REF" == refs/tags/* ]]; then
            VERSION="${GH_REF#refs/tags/v}"
          elif [[ "$EVENT_NAME" == "release" ]]; then
            VERSION="${RELEASE_TAG#v}"
          else
            VERSION=latest
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Check if prerelease
        id: prerelease
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$VERSION" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          # `latest` is kept as a back-compat alias of `crawl`; documentation
          # points users at the explicit `crawl` tag.
          tags: |
            type=raw,value=crawl
            type=raw,value=latest,enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version }}-crawl
            type=semver,pattern={{version}},value=v${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=v${{ steps.version.outputs.version }},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},value=v${{ steps.version.outputs.version }},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=mdream (crawl)
            org.opencontainers.image.description=Site crawler that generates llms.txt artifacts, with Playwright Chrome
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push crawl image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.crawl
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=crawl
          cache-to: type=gha,mode=max,scope=crawl
          build-args: |
            VERSION=${{ steps.version.outputs.version }}

      - name: Test published crawl image
        run: |
          echo "Testing published crawl image..."
          sleep 30
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:crawl

          echo "Testing --help..."
          timeout 60 docker run --rm "$IMAGE" --help > /dev/null
          echo "Testing --version..."
          timeout 60 docker run --rm "$IMAGE" --version > /dev/null

          echo "Testing no-argument help output..."
          OUTPUT=$(timeout 60 docker run --rm "$IMAGE" 2>&1 || true)
          if [[ "$OUTPUT" == *"@mdream/crawl"* ]]; then
            echo "Container shows help when run without arguments!"
          else
            echo "Container should show help when run without arguments"
            echo "Output was: $OUTPUT"
            exit 1
          fi

      - name: Report crawl image size
        run: |
          echo "## Crawl Image Size" >> $GITHUB_STEP_SUMMARY
          SIZE=$(docker inspect ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:crawl --format='{{.Size}}' | numfmt --to=iec-i --suffix=B)
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:crawl\` — **$SIZE**" >> $GITHUB_STEP_SUMMARY

  # ── core image: native Rust HTML-to-Markdown converter ──
  publish-core:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_REF: ${{ github.ref }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_TAG"
          elif [[ "$GH_REF" == refs/tags/* ]]; then
            VERSION="${GH_REF#refs/tags/v}"
          elif [[ "$EVENT_NAME" == "release" ]]; then
            VERSION="${RELEASE_TAG#v}"
          else
            VERSION=latest
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
            ${{ env.REGISTRY_GHCR }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=core
            type=raw,value=${{ steps.version.outputs.version }}-core
          labels: |
            org.opencontainers.image.title=mdream (core)
            org.opencontainers.image.description=Native Rust HTML-to-Markdown converter (stdin to stdout)
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push core image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.core
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Test published core image
        run: |
          echo "Testing published core image..."
          sleep 30
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:core

          echo "Testing --help..."
          timeout 60 docker run --rm "$IMAGE" --help > /dev/null

          echo "Testing HTML-to-Markdown conversion..."
          OUTPUT=$(printf '<h1>Hello</h1><p>world</p>' | timeout 60 docker run -i --rm "$IMAGE")
          if [[ "$OUTPUT" == *"# Hello"* && "$OUTPUT" == *"world"* ]]; then
            echo "Core conversion works!"
          else
            echo "Unexpected core output: $OUTPUT"
            exit 1
          fi

      - name: Report core image size
        run: |
          echo "## Core Image Size" >> $GITHUB_STEP_SUMMARY
          SIZE=$(docker inspect ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:core --format='{{.Size}}' | numfmt --to=iec-i --suffix=B)
          echo "- \`${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:core\` — **$SIZE**" >> $GITHUB_STEP_SUMMARY

  notify-success:
    needs: [publish-crawl, publish-core]
    runs-on: ubuntu-latest
    if: success()
    permissions: {}
    steps:
      - name: Notify release success
        env:
          RELEASE_REF: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          echo "Docker images for $RELEASE_REF published successfully!"
          echo "- crawl: ${{ secrets.DOCKERHUB_USERNAME }}/mdream:crawl (and :latest)"
          echo "- core:  ${{ secrets.DOCKERHUB_USERNAME }}/mdream:core"
